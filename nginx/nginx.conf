worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 20m;
    resolver 127.0.0.11 valid=30s;

    # Compress text assets at the edge of the single-host stack (no CloudFront).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # HTTP server - redirect to HTTPS and handle certbot challenges
    server {
        listen 80;
        server_name partsbazar360.realtrackapp.com;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name partsbazar360.realtrackapp.com;

        ssl_certificate /etc/letsencrypt/live/partsbazar360.realtrackapp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/partsbazar360.realtrackapp.com/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS (uncomment if you're sure)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        location = / {
            return 302 https://$host/buyer/;
        }

        # Buyer marketplace uses Next basePath /buyer. Redirect bare marketplace
        # paths so /search?q=BMW (and similar) resolve instead of nginx 404.
        location ~ ^/(search|garage|cart|checkout|watchlist|support|account|part)(/.*)?$ {
            return 302 https://$host/buyer$request_uri;
        }

        location /admin/ {
            set $admin_upstream http://admin-portal:3000;
            proxy_pass $admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Hashed Next.js assets — long-lived immutable browser cache.
        location ~* ^/buyer/_next/static/ {
            proxy_pass http://buyer-marketplace:3000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ~* ^/admin/_next/static/ {
            proxy_pass http://admin-portal:3000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ~* ^/seller/_next/static/ {
            proxy_pass http://seller-portal:3000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ~* ^/operations/_next/static/ {
            proxy_pass http://operations-portal:3000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ~* ^/workshop/_next/static/ {
            proxy_pass http://workshop-portal:3000;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location /buyer/ {
            set $buyer_upstream http://buyer-marketplace:3000;
            proxy_pass $buyer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /seller/ {
            set $seller_upstream http://seller-portal:3000;
            proxy_pass $seller_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /operations/ {
            set $ops_upstream http://operations-portal:3000;
            proxy_pass $ops_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /workshop/ {
            set $workshop_upstream http://workshop-portal:3000;
            proxy_pass $workshop_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            proxy_pass http://api:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy external listing images to bypass CDN hotlinking restrictions
        location /img-proxy/ {
            set $target_url $arg_url;
            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_set_header Host $proxy_host;
            proxy_set_header Referer "";
            proxy_set_header User-Agent "Mozilla/5.0";
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control "public, max-age=604800" always;
            expires 7d;
            # Avoid buffering huge originals into nginx memory unnecessarily.
            proxy_buffering on;
            proxy_buffers 8 64k;
        }
    }
}
