services:
  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - admin-portal
      - buyer-marketplace
      - seller-portal
      - operations-portal
      - workshop-portal

  api:
    environment:
      CORS_ORIGIN: http://localhost
      RUN_INGESTION_WORKER: "0"
      SCHEMA_MODE: ${SCHEMA_MODE:-migrate}
      BUYER_INTERNAL_URL: http://buyer-marketplace:3000/buyer
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-partsbazar-local-revalidate}

  worker:
    environment:
      RUN_INGESTION_WORKER: "1"

  buyer-marketplace:
    environment:
      SITE_URL: http://localhost/buyer
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-partsbazar-local-revalidate}
  certbot:
    profiles:
      - donotstart
