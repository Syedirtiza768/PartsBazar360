services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: partsbazar_user
      POSTGRES_PASSWORD: partsbazar_password
      POSTGRES_DB: partsbazar_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partsbazar_user -d partsbazar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=ComplexAdminPassword123!
      # Security plugin disabled for local/MVP use so the API can talk to
      # OpenSearch over plain HTTP without managing TLS certs.
      - plugins.security.disabled=true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  # ── Application Services ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://partsbazar_user:partsbazar_password@postgres:5432/partsbazar_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENSEARCH_URL: http://opensearch:9200
      PORT: 3001
      CORS_ORIGIN: https://partsbazar360.realtrackapp.com
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  admin-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: admin-portal
    restart: unless-stopped
    networks:
      - app-network

  buyer-marketplace:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: buyer-marketplace
    environment:
      # Server components/route handlers run inside this container and can
      # reach the API directly over the compose network (faster + avoids an
      # extra hop through nginx for SSR data fetching).
      INTERNAL_API_URL: http://api:3001
      SITE_URL: https://partsbazar360.realtrackapp.com/buyer
    restart: unless-stopped
    networks:
      - app-network

  seller-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: seller-portal
    restart: unless-stopped
    networks:
      - app-network

  operations-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: operations-portal
    restart: unless-stopped
    networks:
      - app-network

  workshop-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: workshop-portal
    restart: unless-stopped
    networks:
      - app-network

  # ── Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - admin-portal
      - buyer-marketplace
      - seller-portal
      - operations-portal
      - workshop-portal
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nginx
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  app-network:
    driver: bridge
