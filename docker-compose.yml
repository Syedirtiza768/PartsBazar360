services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: partsbazar_user
      POSTGRES_PASSWORD: partsbazar_password
      POSTGRES_DB: partsbazar_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partsbazar_user -d partsbazar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=ComplexAdminPassword123!
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - app-network

  # ── Application Services ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://partsbazar_user:partsbazar_password@postgres:5432/partsbazar_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENSEARCH_NODE: http://opensearch:9200
      PORT: 3001
    depends_on:
      - postgres
      - redis
      - opensearch
    networks:
      - app-network

  admin-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: admin-portal
    networks:
      - app-network

  buyer-marketplace:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: buyer-marketplace
    networks:
      - app-network

  seller-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: seller-portal
    networks:
      - app-network

  operations-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: operations-portal
    networks:
      - app-network

  workshop-portal:
    build:
      context: .
      dockerfile: apps/next.Dockerfile
      args:
        APP_NAME: workshop-portal
    networks:
      - app-network

  # ── Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "7070:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - admin-portal
      - buyer-marketplace
      - seller-portal
      - operations-portal
      - workshop-portal
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  app-network:
    driver: bridge
